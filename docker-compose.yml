services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finance_whatsapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  postgres_data:
