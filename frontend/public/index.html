<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Pinta a barra do sistema com a cor do app. Uma cor só ficaria errada em
         um dos temas, então cada um tem a sua (--page do theme.css). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f7f4" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#07110d" />

    <!-- Tipografia da marca: Manrope (títulos/números), Inter (interface),
         JetBrains Mono (valores). `display=swap` mostra o texto na fonte de
         sistema enquanto baixa — ninguém fica olhando pra tela em branco. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Este é o nome que aparece embaixo do ícone no iPhone. -->
    <meta name="apple-mobile-web-app-title" content="MeuBolso" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="description" content="Suas finanças, do WhatsApp ao Obsidian" />

    <title>MeuBolso</title>
  </head>
  <body>
    <noscript>O MeuBolso precisa de JavaScript para funcionar.</noscript>
    <div id="root"></div>
  </body>
</html>
